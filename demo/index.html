<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        h1 {
            color: #2d3748;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f7fafc;
            padding: 15px 30px;
            border-radius: 50px;
            margin-bottom: 40px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #2d3748;
            font-weight: 600;
        }

        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .link-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .link-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .link-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .link-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        .info-box {
            background: #edf2f7;
            border-radius: 10px;
            padding: 20px;
            margin-top: 40px;
            text-align: left;
        }

        .info-box h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #4a5568;
        }

        .info-item .icon {
            color: #48bb78;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .container {
                padding: 40px 20px;
            }

            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 FoodBridge</h1>
        <p class="subtitle">Demo Application</p>

        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text" id="statusText">Checking server...</span>
        </div>

        <div class="links">
            <a href="login.html" class="link-card">
                <div class="link-icon">🔐</div>
                <div class="link-title">Login</div>
                <div class="link-desc">Access your account</div>
            </a>

            <a href="dashboard.html" class="link-card">
                <div class="link-icon">📊</div>
                <div class="link-title">Dashboard</div>
                <div class="link-desc">View your impact</div>
            </a>

            <a href="api-test.html" class="link-card">
                <div class="link-icon">🧪</div>
                <div class="link-title">API Test</div>
                <div class="link-desc">Test endpoints</div>
            </a>

            <a href="server-test.html" class="link-card">
                <div class="link-icon">🔌</div>
                <div class="link-title">Server Status</div>
                <div class="link-desc">Health check</div>
            </a>
        </div>

        <div class="info-box">
            <h3>System Status</h3>
            <div class="info-item">
                <span class="icon">✓</span>
                <span>Server running on port 3005</span>
            </div>
            <div class="info-item">
                <span class="icon">✓</span>
                <span>Database connected (PostgreSQL)</span>
            </div>
            <div class="info-item">
                <span class="icon">✓</span>
                <span>Cache connected (Redis)</span>
            </div>
            <div class="info-item">
                <span class="icon">✓</span>
                <span>17 API endpoints available</span>
            </div>
        </div>
    </div>

    <script>
        // Check server status
        fetch('http://localhost:3005/health')
            .then(response => response.json())
            .then(data => {
                document.getElementById('statusText').textContent = 'Server Online';
            })
            .catch(error => {
                document.getElementById('statusText').textContent = 'Server Offline';
                document.querySelector('.status-dot').style.background = '#f56565';
            });
    </script>
</body>
</html>
